{% extends "base.html" %}

{% block content %}

<section class="section-padding bg-light" style="padding-top:140px;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">

        <div class="vision-box large mb-4">
          <h5><i class="bi bi-lock me-2"></i>Create New Password</h5>
          <p class="mb-0" style="color:var(--clr-muted); font-size:.9rem;">
            Enter your new password below.
          </p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" novalidate>
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label">New Password *</label>
              <input type="password" name="password" class="form-control" required />
            </div>

            <div class="col-12">
              <label class="form-label">Confirm New Password *</label>
              <input type="password" name="confirm_password" class="form-control" required />
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary-green w-100">
                Reset Password
              </button>
            </div>

          </div>
        </form>

      </div>
    </div>
  </div>
</section>

{% endblock %}
