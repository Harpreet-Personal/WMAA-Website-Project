{% extends "base.html" %}

{% block content %}
<section class="section-padding bg-light">
  <div class="container">
    <div class="vision-box large">
      <h2>Thank You for Your Donation</h2>
      <p>
        Thank you, <strong>{{ donation.donor_name or 'Guest' }}</strong>. Your donation of
        <strong>${{ donation.amount or 0 }}</strong> has been successfully submitted.
      </p>

      <hr>

      <p><strong>Email:</strong> {{ donation.donor_email }}</p>
      <p><strong>Status:</strong> {{ donation.status }}</p>

      <a href="{{ url_for('home') }}" class="btn btn-primary-green mt-3">Return Home</a>
    </div>
  </div>
</section>
{% endblock %}
